<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignador de Tareas</title>
    <style>
        * { box-sizing: border-box; }
        body { background: radial-gradient(circle at top, #1e293b 0%, #0f172a 60%); color: #f1f5f9; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1e293b; padding: 36px 32px; border-radius: 18px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.45); }
        select, input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; }
        .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; cursor: pointer; color: white; margin-top: 18px; font-weight: 600; }
        .btn:hover { filter: brightness(1.1); }
        .tarea-item { background: #334155; padding: 12px; margin-top: 10px; border-radius: 8px; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body>

<div class="card">
    <div id="loginPanel">
        <h3>Iniciar Sesión</h3>
        <select id="user"><option>Gestor</option><option>Alejandro</option><option>César</option></select>
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn" style="background:#3b82f6" onclick="entrar()">Entrar</button>
    </div>

    <div id="panelPrincipal" style="display:none;">
        <h3>Administrar Tareas</h3>
        <div id="areaGestor" style="display:none;">
            <input type="text" id="nombreTarea" placeholder="Nueva tarea...">
            <select id="asignarA"><option>Alejandro</option><option>César</option></select>
            <button class="btn" style="background:#3b82f6" onclick="crearTarea()">Crear/Asignar</button>
            <hr style="border:0; border-top:1px solid #334155; margin: 20px 0;">
        </div>
        <div id="lista"></div>
        <button class="btn" style="background:#ef4444;" onclick="location.reload()">Cerrar sesión</button>
    </div>
</div>

<script>
    const URL = 'https://abliexzdcfpvjairjraj.supabase.co/rest/v1';
    const KEY = 'sb_publishable_F5DJjPxXtl22rOV5RKowWA_Dxmg_UB3';
    let currentUser = "";

    async function entrar() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const res = await fetch(`${URL}/rpc/verificar_login`, {
            method: 'POST',
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ p_nombre: user, p_contrasena: pass })
        });
        const data = await res.json();
        if (data.length > 0) {
            currentUser = user;
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('panelPrincipal').style.display = 'block';
            if(user === 'Gestor') document.getElementById('areaGestor').style.display = 'block';
            cargarTareas();
        } else { alert("Datos incorrectos"); }
    }

    async function cargarTareas() {
        const res = await fetch(`${URL}/tareas?select=*`, { headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` } });
        const tareas = await res.json();
        
        // Si es gestor, mostramos todas las tareas, si no, solo las suyas
        const mostrar = currentUser === 'Gestor' ? tareas : tareas.filter(t => t.turno === currentUser);

        document.getElementById('lista').innerHTML = mostrar.map(t => `
            <div class="tarea-item">
                <b>${t.nombre}</b><br>
                <small>Asignado a: ${t.turno} | Estado: ${t.estado}</small>
            </div>
        `).join('');
    }

    async function crearTarea() {
        const nombre = document.getElementById('nombreTarea').value.trim();
        const turno = document.getElementById('asignarA').value;
        if (!nombre) return;

        await fetch(`${URL}/tareas`, {
            method: 'POST',
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre, turno, estado: 'pendiente' })
        });
        document.getElementById('nombreTarea').value = '';
        cargarTareas();
    }
</script>
</body>
</html>
