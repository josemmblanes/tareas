<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignador de Tareas</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 60%);
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 36px 32px;
            border-radius: 18px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.45), 0 0 0 1px rgba(148,163,184,0.08);
        }
        h3 {
            margin: 0 0 24px 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        #loginPanel h3 {
            text-align: center;
        }
        select, input {
            width: 100%;
            padding: 12px 14px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        select:focus, input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.25);
        }
        select::-ms-expand { background: #0f172a; }
        input::placeholder { color: #64748b; }
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            margin-top: 18px;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.2px;
            transition: transform 0.15s ease, filter 0.15s ease;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); filter: brightness(0.95); }
        .tarea-item { background: #334155; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body>

<div style="text-align:center; margin-bottom:18px;">
    <h1 style="font-size:28px; font-weight:800; letter-spacing:-0.5px; margin:0; color:#f1f5f9;">Asignador de Tareas</h1>
</div>
<div class="card">
    <div id="loginPanel">
        <h3>Iniciar Sesión</h3>
        <select id="user"><option>Gestor</option><option>Alejandro</option><option>César</option></select>
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn" style="background:#3b82f6" onclick="entrar()">Entrar</button>
    </div>

    <div id="panelPrincipal" style="display:none;">
        <h3 id="titulo">Mis Tareas</h3>
        <div id="areaGestor" style="display:none;">
            <input type="text" id="nombreTarea" placeholder="Nueva tarea...">
            <select id="asignarA"><option>Alejandro</option><option>César</option></select>
            <button class="btn" style="background:#3b82f6" onclick="crearTarea()">Crear Tarea</button>
        </div>
        <div id="lista"></div>
        <button class="btn" style="background:#8b5cf6" onclick="verHistorial()">Ver Historial Completo</button>
        <button class="btn" style="background:#ef4444;" onclick="location.reload()">Cerrar sesión</button>
    </div>
</div>

<script>
    const URL = 'https://abliexzdcfpvjairjraj.supabase.co/rest/v1';
    const KEY = 'sb_publishable_F5DJjPxXtl22rOV5RKowWA_Dxmg_UB3';
    let currentUser = "";

    // Evita romper el filtro PostgREST y evita inyectar HTML/JS al insertar datos con innerHTML.
    function escaparHTML(valor) {
        const div = document.createElement('div');
        div.textContent = valor ?? '';
        return div.innerHTML;
    }

    async function entrar() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const res = await fetch(`${URL}/rpc/verificar_login`, {
            method: 'POST',
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ p_nombre: user, p_contrasena: pass })
        });
        const data = await res.json();
        if (data.length > 0) {
            currentUser = user;
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('panelPrincipal').style.display = 'block';
            if(user === 'Gestor') document.getElementById('areaGestor').style.display = 'block';
            cargarTareas();
        } else { alert("Datos incorrectos"); }
    }

    async function cargarTareas() {
        const res = await fetch(`${URL}/tareas?select=*`, { headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` } });
        const tareas = await res.json();
        const filtradas = currentUser === 'Gestor' ? tareas : tareas.filter(t => t.turno === currentUser);

        if (currentUser === 'Gestor') {
            document.getElementById('lista').innerHTML = filtradas
                .filter(t => t.estado !== 'verificada')
                .map(t => `
                    <div class="tarea-item">
                        <b>${escaparHTML(t.nombre)}</b><br>
                        <span>Asignado: ${escaparHTML(t.turno)} | Estado: ${escaparHTML(t.estado)}</span><br>
                        ${t.estado === 'hecha' ? `<button class="btn" style="background:#f59e0b" data-accion="verificar" data-id="${t.id}" data-turno="${escaparHTML(t.turno)}" data-nombre="${escaparHTML(t.nombre)}">Verificar</button>` : ''}
                        <div style="display:flex; gap:8px; margin-top:8px;">
                            <select data-reasignar-select="${t.id}" style="margin-top:0;">
                                ${USUARIOS_ROTACION.map(u => `<option value="${u}" ${u === t.turno ? 'selected' : ''}>${u}</option>`).join('')}
                            </select>
                            <button class="btn" style="background:#64748b; margin-top:0; width:auto; padding:10px 16px;" data-accion="reasignar" data-id="${t.id}">Reasignar</button>
                        </div>
                    </div>
                `).join('');
            asignarEventosLista();
            return;
        }

        const pendientes = filtradas.filter(t => t.estado === 'pendiente');
        const porVerificar = filtradas.filter(t => t.estado === 'hecha');

        const htmlPendientes = pendientes.length > 0
            ? pendientes.map(t => `
                <div class="tarea-item">
                    <b>${escaparHTML(t.nombre)}</b><br>
                    <span>Asignado: ${escaparHTML(t.turno)} | Estado: ${escaparHTML(t.estado)}</span><br>
                    <button class="btn" style="background:#10b981" data-accion="marcarHecha" data-id="${t.id}">Hecha</button>
                </div>
            `).join('')
            : `<p style="color:#94a3b8;">No tienes ninguna tarea pendiente.</p>`;

        const htmlPorVerificar = porVerificar.length > 0
            ? porVerificar.map(t => `
                <div class="tarea-item">
                    <b>${escaparHTML(t.nombre)}</b><br>
                    <span>Asignado: ${escaparHTML(t.turno)} | Estado: ${escaparHTML(t.estado)}</span><br>
                </div>
            `).join('')
            : `<p style="color:#94a3b8;">No tienes ninguna tarea por verificar.</p>`;

        document.getElementById('lista').innerHTML = `
            <h4>Tareas pendientes</h4>
            ${htmlPendientes}
            <h4 style="margin-top:20px;">Tareas por verificar</h4>
            ${htmlPorVerificar}
        `;
        asignarEventosLista();
    }

    // Delegación de eventos: evita interpolar datos del usuario dentro de atributos onclick (frágil ante comillas e inyectable).
    function asignarEventosLista() {
        document.querySelectorAll('#lista [data-accion="marcarHecha"]').forEach(btn => {
            btn.addEventListener('click', () => marcarHecha(btn.dataset.id));
        });
        document.querySelectorAll('#lista [data-accion="verificar"]').forEach(btn => {
            btn.addEventListener('click', () => verificar(btn.dataset.id, btn.dataset.turno, btn.dataset.nombre));
        });
        document.querySelectorAll('#lista [data-accion="reasignar"]').forEach(btn => {
            btn.addEventListener('click', () => {
                const select = document.querySelector(`[data-reasignar-select="${btn.dataset.id}"]`);
                reasignarTarea(btn.dataset.id, select.value);
            });
        });
    }

    // Solo el Gestor tiene acceso a este control desde la UI (areaGestor).
    // Al reasignar, la tarea vuelve a 'pendiente': el nuevo usuario no ha hecho nada todavía,
    // así que no tendría sentido que apareciera como 'hecha' en su lista.
    async function reasignarTarea(id, nuevoTurno) {
        await fetch(`${URL}/tareas?id=eq.${id}`, {
            method: 'PATCH',
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ turno: nuevoTurno, estado: 'pendiente' })
        });
        cargarTareas();
    }

    async function marcarHecha(id) {
        await fetch(`${URL}/tareas?id=eq.${id}`, {
            method: 'PATCH',
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
            body: JSON.stringify({ estado: 'hecha' })
        });
        cargarTareas();
    }

    const USUARIOS_ROTACION = ['Alejandro', 'César'];

    function obtenerOtroUsuario(turnoActual) {
        return USUARIOS_ROTACION.find(u => u !== turnoActual) || turnoActual;
    }

    async function verificar(id, turno, nombre) {
        try {
            // 1. Guardar en historial con formato seguro
            const resHistorial = await fetch(`${URL}/historial`, {
                method: 'POST',
                headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    nombre_tarea: nombre, 
                    usuario: turno, 
                    "fecha_verificación": new Date().toISOString() 
                })
            });

            if (!resHistorial.ok) {
                const errorBody = await resHistorial.json();
                console.error("Detalle Supabase (historial):", errorBody);
                throw new Error(errorBody.message || "Error guardando historial");
            }

            // 2. Reasignar la tarea automáticamente al otro usuario y volver a 'pendiente'
            const nuevoUsuario = obtenerOtroUsuario(turno);
            const resTarea = await fetch(`${URL}/tareas?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ estado: 'pendiente', turno: nuevoUsuario })
            });
            
            if (!resTarea.ok) {
                const errorBody = await resTarea.json();
                console.error("Detalle Supabase (tareas):", errorBody);
                throw new Error(errorBody.message || "Error actualizando tarea");
            }
            
            cargarTareas();
        } catch (e) {
            console.error(e);
            alert("Error al verificar. Revisa los permisos de la tabla historial.");
        }
    }

    async function verHistorial() {
        const res = await fetch(`${URL}/historial?select=*&order=fecha_verificaci%C3%B3n.desc`, { 
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` } 
        });
        const historial = await res.json();

        const coloresHistorial = ['#334155', '#3f3a52', '#2f4858', '#3a4a3f', '#4a3a4a', '#4a4030', '#2f3a52', '#43344a'];

        function colorPorTarea(nombreTarea) {
            const str = nombreTarea || 'Sin nombre';
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash * 31 + str.charCodeAt(i)) % 1000000;
            }
            return coloresHistorial[hash % coloresHistorial.length];
        }
        
        const botonExportar = currentUser === 'Gestor'
            ? `<button class="btn" style="background:#10b981" onclick="exportarHistorialCSV()">Exportar CSV</button>`
            : '';
        
        document.getElementById('lista').innerHTML = "<h3>Historial</h3>" + historial.map(t => `
            <div class="tarea-item" style="background:${colorPorTarea(t.nombre_tarea)}; display:flex; justify-content:space-between; align-items:center; flex-wrap:nowrap; gap:8px; white-space:nowrap; overflow:hidden;">
                <b style="overflow:hidden; text-overflow:ellipsis;">${escaparHTML(t.nombre_tarea || 'Sin nombre')}</b>
                <span style="overflow:hidden; text-overflow:ellipsis;">Hecho por: ${escaparHTML(t.usuario || 'N/A')}</span>
                <span>${t['fecha_verificación'] ? new Date(t['fecha_verificación']).toLocaleString() : 'Sin fecha'}</span>
            </div>
        `).join('') + botonExportar + `<button class="btn" data-accion="volver">Volver</button>`;

        document.querySelector('#lista [data-accion="volver"]')?.addEventListener('click', cargarTareas);
    }

    function escaparCSV(valor) {
        const str = String(valor ?? '');
        if (str.includes(',') || str.includes('"') || str.includes('\n')) {
            return `"${str.replace(/"/g, '""')}"`;
        }
        return str;
    }

    async function exportarHistorialCSV() {
        const res = await fetch(`${URL}/historial?select=*&order=fecha_verificaci%C3%B3n.desc`, { 
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` } 
        });
        const historial = await res.json();

        const encabezados = ['Tarea', 'Usuario', 'Fecha de verificación'];
        const filas = historial.map(t => [
            escaparCSV(t.nombre_tarea || 'Sin nombre'),
            escaparCSV(t.usuario || 'N/A'),
            escaparCSV(t['fecha_verificación'] ? new Date(t['fecha_verificación']).toLocaleString() : 'Sin fecha')
        ].join(','));

        const csv = '\uFEFF' + [encabezados.join(','), ...filas].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = window.URL.createObjectURL(blob);
        const enlace = document.createElement('a');
        enlace.href = url;
        enlace.download = `historial_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(enlace);
        enlace.click();
        document.body.removeChild(enlace);
        window.URL.revokeObjectURL(url);
    }

    async function crearTarea() {
        const nombre = document.getElementById('nombreTarea').value.trim();
        const turno = document.getElementById('asignarA').value;
        if (!nombre) {
            alert("Escribe un nombre de tarea antes de crearla.");
            return;
        }
        await fetch(`${URL}/tareas`, {
            method: 'POST',
            headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
            body: JSON.stringify({ nombre: nombre, turno: turno, estado: 'pendiente' })
        });
        document.getElementById('nombreTarea').value = '';
        cargarTareas();
    }
</script>
</body>
</html>
